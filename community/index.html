<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inkwell — Forum</title>

<link rel="icon" type="image/svg+xml" href="../icon.svg">
<link rel="alternate icon" type="image/x-icon" href="../icon.ico">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+Infant:ital,wght@0,300;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
/* Additional specific styling for the interactive community forum */
.forum-new-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--gold-dim);
  border: 0.5px solid var(--gold-light);
  color: var(--gold-light);
  padding: 10px 22px;
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .2s, transform .1s;
  margin-bottom: 30px;
}
.forum-new-btn:hover {
  background: rgba(201,162,39,0.25);
  transform: translateY(-1px);
}
.forum-form-card {
  background: var(--navy-card);
  border: 0.5px solid var(--navy-border);
  padding: 30px;
  border-radius: 8px;
  margin-bottom: 40px;
  display: none; /* toggled via JS */
  animation: fu .4s ease forwards;
}
.forum-form-card.open {
  display: block;
}
.forum-input-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 18px;
}
.forum-input-group label {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gold-light);
}
.forum-input-group input, .forum-input-group select, .forum-input-group textarea {
  padding: 12px;
  background: rgba(0,0,0,0.25);
  border: 0.5px solid var(--navy-border);
  color: var(--cream);
  border-radius: 4px;
  font-family: 'Jost', sans-serif;
  font-size: 14px;
  width: 100%;
}
.forum-input-group input:focus, .forum-input-group select:focus, .forum-input-group textarea:focus {
  border-color: var(--gold);
  outline: none;
}
.forum-filter-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 30px;
  border-bottom: 0.5px solid var(--navy-border);
  padding-bottom: 14px;
  flex-wrap: wrap;
}
.forum-filter-btn {
  background: transparent;
  border: 0.5px solid transparent;
  color: var(--text-muted);
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 6px 14px;
  cursor: pointer;
  transition: color .2s, border-color .2s;
}
.forum-filter-btn:hover {
  color: var(--gold-light);
}
.forum-filter-btn.active {
  border-color: var(--gold-light);
  color: var(--gold-light);
  background: var(--gold-dim);
}
.post-item-card {
  background: var(--navy-card);
  border: 0.5px solid var(--navy-border);
  border-radius: 8px;
  padding: 26px 30px;
  margin-bottom: 24px;
  text-align: left;
  position: relative;
  overflow: hidden;
  transition: border-color .2s;
}
.post-item-card:hover {
  border-color: rgba(201,162,39,0.35);
}
.post-item-card.question {
  border-left: 4px solid var(--gold);
}
.post-item-card.bug {
  border-left: 4px solid #d9534f;
}
.post-meta-line {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 10px;
}
.post-badge {
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
  font-weight: 500;
}
.post-badge.question {
  background: var(--gold-dim);
  color: var(--gold-light);
  border: 0.5px solid rgba(201,162,39,0.3);
}
.post-badge.bug {
  background: rgba(217,83,79,0.12);
  color: #ffd289;
  border: 0.5px solid rgba(217,83,79,0.25);
}
.post-author-time {
  font-size: 12px;
  color: var(--text-muted);
}
.post-author-time strong {
  color: var(--gold-light);
  font-weight: 400;
}
.post-item-card h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-style: italic;
  font-weight: 400;
  color: var(--cream);
  margin-bottom: 8px;
  line-height: 1.2;
}
.post-body-text {
  font-size: 14px;
  color: var(--text-body);
  line-height: 1.7;
  margin-bottom: 20px;
  white-space: pre-wrap;
}

/* Replies list */
.replies-section {
  border-top: 0.5px solid var(--navy-border);
  padding-top: 18px;
  margin-top: 18px;
}
.replies-title {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gold-light);
  margin-bottom: 12px;
}
.reply-item {
  background: rgba(0,0,0,0.15);
  border: 0.5px solid rgba(255,255,255,0.03);
  padding: 14px 18px;
  border-radius: 4px;
  margin-bottom: 10px;
  font-size: 13px;
}
.reply-item:last-child {
  margin-bottom: 0;
}
.reply-meta {
  display: flex;
  justify-content: space-between;
  color: var(--text-muted);
  font-size: 11px;
  margin-bottom: 6px;
}
.reply-meta strong {
  color: var(--gold-light);
  font-weight: 400;
}
.reply-text {
  color: var(--text-body);
  line-height: 1.6;
}

/* Add Reply Form */
.reply-form {
  margin-top: 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.reply-form-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.reply-form input {
  flex: 1;
  min-width: 140px;
  padding: 8px 12px;
  background: rgba(0,0,0,0.2);
  border: 0.5px solid var(--navy-border);
  color: var(--cream);
  border-radius: 4px;
  font-family: 'Jost', sans-serif;
  font-size: 12px;
}
.reply-form textarea {
  padding: 8px 12px;
  background: rgba(0,0,0,0.2);
  border: 0.5px solid var(--navy-border);
  color: var(--cream);
  border-radius: 4px;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  resize: vertical;
  width: 100%;
}
.reply-form input:focus, .reply-form textarea:focus {
  border-color: var(--gold);
  outline: none;
}
.reply-submit-btn {
  background: transparent;
  border: 0.5px solid var(--gold);
  color: var(--gold-light);
  padding: 7px 16px;
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .2s;
  align-self: flex-end;
}
.reply-submit-btn:hover {
  background: var(--gold-dim);
}
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="nav-logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
      <defs>
        <linearGradient id="gN" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#d4a857"/><stop offset="100%" style="stop-color:#a8860c"/></linearGradient>
        <linearGradient id="cN" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#2a2a3a"/><stop offset="100%" style="stop-color:#1a1a24"/></linearGradient>
      </defs>
      <rect x="45" y="28" width="166" height="195" rx="8" fill="url(#cN)"/>
      <rect x="55" y="35" width="150" height="180" rx="4" fill="#f5f0e6"/>
      <rect x="58" y="38" width="144" height="174" rx="3" fill="#faf8f3"/>
      <g stroke="#d4c8b0" stroke-width="1.5" opacity="0.6"><line x1="75" y1="70" x2="185" y2="70"/><line x1="75" y1="90" x2="185" y2="90"/><line x1="75" y1="110" x2="185" y2="110"/><line x1="75" y1="130" x2="185" y2="130"/></g>
      <rect x="45" y="28" width="18" height="195" rx="4" fill="url(#cN)"/>
      <rect x="48" y="32" width="3" height="187" fill="url(#gN)" opacity="0.8"/>
      <text x="95" y="105" font-family="Georgia,serif" font-size="52" font-style="italic" font-weight="bold" fill="url(#gN)">J</text>
    </svg>
    <span>Inkwell</span>
  </a>
  <div class="nav-right">
    <button id="btn-open-login" class="nav-dl" title="Web-App / Login" style="padding: 6px 12px; display: flex; align-items: center; gap: 8px; border-radius: 20px; cursor: pointer;">
      <svg class="nav-icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      <svg class="nav-icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="display: none;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      <span data-i18n="nav_login">Anmelden</span>
    </button>
    <div class="lang-sw">
      <button class="lb active" onclick="setLang('de')">DE</button>
      <button class="lb" onclick="setLang('en')">EN</button>
      <button class="lb" onclick="setLang('it')">IT</button>
    </div>
    <div class="lang-sw-mobile-custom" style="display: none; position: relative;">
      <button id="lang-btn-mobile" onclick="toggleMobileLangMenu(event)" style="background: transparent; border: 0.5px solid var(--gold); color: var(--gold-light); font-family: 'Jost', sans-serif; font-size: 11px; padding: 6px 12px; text-transform: uppercase; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; height: 36px; letter-spacing: 0.14em;">
        <span style="font-size: 11px; font-weight: 500; text-transform: uppercase; display: inline !important;">DE</span>
      </button>
      <div id="lang-dropdown-mobile" style="display: none; position: absolute; top: 42px; right: 0; background: var(--navy-card); border: 0.5px solid var(--navy-border); box-shadow: 0 8px 24px rgba(0,0,0,0.5); border-radius: 4px; padding: 4px; z-index: 1000; min-width: 60px;">
        <button class="lb" onclick="setLang('de'); toggleMobileLangMenu()" style="display: block; width: 100%; text-align: center; padding: 8px 12px;">DE</button>
        <button class="lb" onclick="setLang('en'); toggleMobileLangMenu()" style="display: block; width: 100%; text-align: center; padding: 8px 12px;">EN</button>
        <button class="lb" onclick="setLang('it'); toggleMobileLangMenu()" style="display: block; width: 100%; text-align: center; padding: 8px 12px;">IT</button>
      </div>
    </div>
  </div>
</nav>

<div class="page-container">
  <div class="page-header">
    <h1 class="page-title" data-i18n="community_title">Inkwell Forum</h1>
    <p class="page-subtitle" data-i18n="community_subtitle">Stelle Fragen, diskutiere Ideen oder melde Fehler direkt an den Entwickler.</p>
  </div>

  <div style="text-align: left;">
    <!-- Toggle post form button -->
    <button onclick="togglePostForm()" class="forum-new-btn">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" style="display: inline-block; vertical-align: middle; margin-right: 4px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      <span data-i18n="community_new_post">Neuen Beitrag erstellen</span>
    </button>

    <!-- Create Post Form Card -->
    <div id="post-form-card" class="forum-form-card">
      <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 28px; font-style: italic; color: var(--gold-light); margin-bottom: 20px;" data-i18n="community_new_post">Neuen Beitrag erstellen</h3>
      
      <form id="new-post-form" onsubmit="handleCreatePost(event)">
        <div class="forum-input-group">
          <label for="post-title" data-i18n="community_post_title">Titel</label>
          <input type="text" id="post-title" required placeholder="Titel des Beitrags">
        </div>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
          <div class="forum-input-group">
            <label for="post-type" data-i18n="community_post_type">Kategorie</label>
            <select id="post-type">
              <option value="question" data-i18n="community_type_question">Frage / Diskussion</option>
              <option value="bug" data-i18n="community_type_bug">Fehler melden (Bug)</option>
            </select>
          </div>
          <div class="forum-input-group">
            <label for="post-author" data-i18n="community_post_author">Dein Name</label>
            <input type="text" id="post-author" required placeholder="Name oder Pseudonym">
          </div>
        </div>
        
        <div class="forum-input-group" style="margin-top: 10px;">
          <label for="post-content" data-i18n="community_post_content">Beschreibung / Details</label>
          <textarea id="post-content" rows="5" required placeholder="Beschreibe deine Frage oder den Fehler möglichst genau..."></textarea>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 14px; margin-top: 10px;">
          <button type="button" onclick="togglePostForm()" class="btn-m">Abbrechen</button>
          <button type="submit" class="btn-m" style="background: var(--gold-dim); border-color: var(--gold-light); color: var(--gold-light);" data-i18n="community_publish_btn">Beitrag veröffentlichen</button>
        </div>
      </form>
    </div>

    <!-- Filter Bar -->
    <div class="forum-filter-bar">
      <button id="filter-all" onclick="setFilter('all')" class="forum-filter-btn active" data-i18n="community_filter_all">Alle Beiträge</button>
      <button id="filter-question" onclick="setFilter('question')" class="forum-filter-btn" data-i18n="community_filter_questions">Fragen & Diskussionen</button>
      <button id="filter-bug" onclick="setFilter('bug')" class="forum-filter-btn" data-i18n="community_filter_bugs">Fehlerberichte</button>
    </div>

    <!-- Posts Feed Container -->
    <div id="forum-feed-list"></div>
  </div>
</div>

<footer>
  <p>© 2025 Inkwell · Anvi</p>
  <div class="fl">
    <a href="https://github.com/manuel0anvi/Inkwell" target="_blank">GitHub</a>
    <a href="#" data-i18n="nav_community">Community</a>
    <a href="../datenschutz/index.html" data-i18n="nav_datenschutz">Datenschutz</a>
  </div>
</footer>

<!-- Scripts -->
<script src="../js/i18n.js"></script>
<script src="../js/common.js"></script>
<script>
// Mock initial dataset for first-load seeding
const INITIAL_POSTS = [
  {
    id: "p1",
    type: "question",
    title: "Pinsel-Templates und eigene Hintergründe teilen",
    author: "anvi_ink",
    content: "Hallo zusammen! Ich liebe die neue Touch-Zeichenfunktion in Inkwell. Gibt es hier Leute, die eigene Hintergrund-Templates (z.B. für Notenblätter oder Musiknotizen) teilen möchten? Wäre super, wenn wir hier eine kleine Sammlung aufbauen könnten!",
    timestamp: "2026-05-25T14:32:00.000Z",
    replies: [
      {
        author: "notiz_held",
        content: "Das ist eine großartige Idee! Ich habe ein paar dot-grid (Punktraster) Templates entworfen, die ich gerne hochlade. Ich mache dazu die Tage mal einen GitHub Pull Request!",
        timestamp: "2026-05-25T16:45:00.000Z"
      }
    ]
  },
  {
    id: "p2",
    type: "bug",
    title: "PDF-Export skaliert auf High-DPI Displays falsch",
    author: "dev_test",
    content: "Mir ist aufgefallen, dass wenn ich ein Notizbuch mit importierten PDFs auf meinem 4K Monitor exportiere, die handschriftlichen Anmerkungen leicht verschoben gezeichnet werden. Auf meinem 1080p Monitor passt alles perfekt. Vermutlich liegt es an der canvas.width/height DPR-Skalierung im Exporter.",
    timestamp: "2026-05-26T09:12:00.000Z",
    replies: [
      {
        author: "manuel0anvi",
        content: "Vielen Dank für den detaillierten Fehlerbericht! Das klingt tatsächlich nach einem Rundungsfehler bei der DPR-Berechnung im Export-Modul. Ich schaue mir das direkt an und werde im nächsten Release (v1.0.8) einen Fix bereitstellen.",
        timestamp: "2026-05-26T11:20:00.000Z"
      }
    ]
  }
];

let posts = [];
let currentFilter = 'all';

function togglePostForm() {
  const card = document.getElementById('post-form-card');
  card.classList.toggle('open');
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.forum-filter-btn').forEach(btn => btn.classList.remove('active'));
  
  if (filter === 'all') document.getElementById('filter-all').classList.add('active');
  else if (filter === 'question') document.getElementById('filter-question').classList.add('active');
  else if (filter === 'bug') document.getElementById('filter-bug').classList.add('active');
  
  renderFeed();
}

function getFormattedDate(isoString) {
  const date = new Date(isoString);
  const locale = lang === 'de' ? 'de-DE' : lang === 'it' ? 'it-IT' : 'en-GB';
  return date.toLocaleDateString(locale, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function handleCreatePost(event) {
  event.preventDefault();
  
  const title = document.getElementById('post-title').value.trim();
  const type = document.getElementById('post-type').value;
  const author = document.getElementById('post-author').value.trim() || "Gast";
  const content = document.getElementById('post-content').value.trim();
  
  const newPost = {
    id: 'post_' + Date.now(),
    type: type,
    title: title,
    author: author,
    content: content,
    timestamp: new Date().toISOString(),
    replies: []
  };
  
  posts.unshift(newPost);
  localStorage.setItem('inkwell_community_posts', JSON.stringify(posts));
  
  // Reset Form and toggle view
  document.getElementById('new-post-form').reset();
  togglePostForm();
  
  renderFeed();
}

function handleCreateReply(event, postId) {
  event.preventDefault();
  
  const form = event.target;
  const author = form.querySelector('.reply-author-input').value.trim() || "Gast";
  const content = form.querySelector('.reply-content-input').value.trim();
  
  if (!content) return;
  
  const postIndex = posts.findIndex(p => p.id === postId);
  if (postIndex === -1) return;
  
  const newReply = {
    author: author,
    content: content,
    timestamp: new Date().toISOString()
  };
  
  posts[postIndex].replies.push(newReply);
  localStorage.setItem('inkwell_community_posts', JSON.stringify(posts));
  
  renderFeed();
}

function renderFeed() {
  const container = document.getElementById('forum-feed-list');
  container.innerHTML = '';
  
  const filteredPosts = posts.filter(post => {
    if (currentFilter === 'all') return true;
    return post.type === currentFilter;
  });
  
  if (filteredPosts.length === 0) {
    container.innerHTML = `<div class="v-loading" style="border:0.5px solid var(--navy-border); background:var(--navy-card);" data-i18n="community_no_posts">${t('community_no_posts') || 'Noch keine Beiträge vorhanden. Schreibe den ersten!'}</div>`;
    return;
  }
  
  filteredPosts.forEach(post => {
    const card = document.createElement('div');
    card.className = `post-item-card ${post.type}`;
    
    const badgeText = post.type === 'question' ? t('community_type_question') : t('community_type_bug');
    const badgeClass = post.type === 'question' ? 'question' : 'bug';
    
    // Construct HTML string
    let html = `
      <div class="post-meta-line">
        <span class="post-badge ${badgeClass}">${badgeText}</span>
        <span class="post-author-time">von <strong>${post.author}</strong> am ${getFormattedDate(post.timestamp)}</span>
      </div>
      <h3>${post.title}</h3>
      <div class="post-body-text">${post.content}</div>
    `;
    
    // Replies block
    html += `<div class="replies-section">
      <h4 class="replies-title">${post.replies.length} ${t('community_replies') || 'Antworten'}</h4>`;
      
    if (post.replies.length > 0) {
      html += `<div style="display:flex; flex-direction:column; gap:8px; margin-bottom:14px;">`;
      post.replies.forEach(reply => {
        html += `
          <div class="reply-item">
            <div class="reply-meta">
              <strong>${reply.author}</strong>
              <span>${getFormattedDate(reply.timestamp)}</span>
            </div>
            <div class="reply-text">${reply.content}</div>
          </div>
        `;
      });
      html += `</div>`;
    }
    
    // Add reply form
    html += `
        <form class="reply-form" onsubmit="handleCreateReply(event, '${post.id}')">
          <div class="reply-form-row">
            <input type="text" class="reply-author-input" required placeholder="${t('community_post_author') || 'Dein Name'}">
            <textarea class="reply-content-input" rows="2" required placeholder="${t('community_add_reply') || 'Antwort verfassen...'}"></textarea>
          </div>
          <button type="submit" class="reply-submit-btn">${t('community_reply_btn') || 'Antworten'}</button>
        </form>
      </div>
    `;
    
    card.innerHTML = html;
    container.appendChild(card);
  });
}

// Initial Data Load and Seeding
document.addEventListener('DOMContentLoaded', () => {
  const stored = localStorage.getItem('inkwell_community_posts');
  if (stored) {
    posts = JSON.parse(stored);
  } else {
    posts = INITIAL_POSTS;
    localStorage.setItem('inkwell_community_posts', JSON.stringify(posts));
  }
  
  // Hook language callback to redraw feed on language switches
  if (typeof addLangChangeListener === 'function') {
    addLangChangeListener(() => {
      renderFeed();
    });
  }
  
  renderFeed();
});
</script>
</body>
</html>
